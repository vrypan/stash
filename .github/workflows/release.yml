name: Release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-22.04
    outputs:
      tag: ${{ steps.version.outputs.tag }}
    env:
      PACKAGE_NAME: stash
      ZIG_VERSION: 0.16.0
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Zig
        uses: mlugg/setup-zig@v2.2.1
        with:
          version: ${{ env.ZIG_VERSION }}

      - name: Derive release version
        id: version
        shell: bash
        run: |
          set -euo pipefail

          version="$(sed -n 's/^[[:space:]]*\.version = "\(.*\)",[[:space:]]*$/\1/p' build.zig.zon | head -n 1)"
          if [[ -z "$version" ]]; then
            echo "could not read version from build.zig.zon" >&2
            exit 1
          fi

          tag="v${version}"
          if git ls-remote --exit-code --tags origin "refs/tags/${tag}" >/dev/null 2>&1; then
            echo "tag already exists on origin: ${tag}" >&2
            exit 1
          fi

          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"

      - name: Build release archives
        shell: bash
        run: |
          set -euo pipefail

          targets=(
            "aarch64-linux-gnu"
            "x86_64-linux-gnu"
            "aarch64-macos"
            "x86_64-macos"
          )

          mkdir -p dist

          for target in "${targets[@]}"; do
            install_dir="$PWD/dist/install-${target}"
            package_dir="$PWD/dist/package-${target}"
            archive="$PWD/dist/${PACKAGE_NAME}-${target}.tar.xz"

            zig build \
              -Doptimize=ReleaseSmall \
              -Dtarget="$target" \
              -p "$install_dir"

            mkdir -p "$package_dir"
            cp "$install_dir/bin/stash" "$package_dir/stash"
            cp "$install_dir/bin/stash-completion" "$package_dir/stash-completion"
            cp LICENSE README.md CHANGELOG.md "$package_dir/"
            cp -R scripts "$package_dir/scripts"

            tar -C "$package_dir" -cJf "$archive" .
          done

          shasum -a 256 dist/*.tar.xz > dist/SHA256SUMS

      - name: Create release tag
        shell: bash
        run: |
          set -euo pipefail

          tag="${{ steps.version.outputs.tag }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$tag" -m "Release $tag"
          git push origin "$tag"

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-artifacts-${{ steps.version.outputs.tag }}
          path: |
            dist/*.tar.xz
            dist/SHA256SUMS

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail

          tag="${{ steps.version.outputs.tag }}"
          notes_file="$RUNNER_TEMP/release-notes.md"
          {
            echo "Release ${tag}"
            echo
            echo "Built from Zig source with Zig ${ZIG_VERSION}."
          } > "$notes_file"

          gh release create "$tag" \
            --target "$GITHUB_SHA" \
            --title "$tag" \
            --notes-file "$notes_file" \
            dist/*.tar.xz \
            dist/SHA256SUMS

  update-homebrew-formula:
    needs: release
    uses: ./.github/workflows/update-homebrew-formula.yml
    with:
      tag: ${{ needs.release.outputs.tag }}
    secrets: inherit
