version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: stash
    binary: stash
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X stash/cmd.Version={{.Version}}

archives:
  - id: stash
    ids:
      - stash
    formats:
      - tar.gz
    files:
      - LICENSE
      - README.md
      - docs/**
      - scripts/**
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
      {{- if .Arm }}v{{ .Arm }}{{ end }}
changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
